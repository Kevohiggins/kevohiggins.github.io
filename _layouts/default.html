<!DOCTYPE html>
<html lang="es">
<head>
  {% include head.html %}
</head>
<body>

  <header role="banner">
    <a href="{{ '/' | relative_url }}" style="font-size: 2.5em; font-weight: bold; text-decoration: none; display: block; margin-bottom: 10px;">
      {{ site.title }}
    </a>
    {% include nav.html %}
  </header>

  <hr>

  <main role="main" aria-label="Contenido principal">
    {{ content }}
  </main>

  {% include footer.html %}

<script>
  (function() {
    const hora = new Date().getHours();
    // Si son entre las 7 y las 20, activamos el look claro en todo el sitio
    if (hora >= 7 && hora < 20) {
      document.body.classList.add('modo-dia');
    } else {
      document.body.classList.remove('modo-dia');
    }
  })();
</script>
</body>
</html>

<script>
  const btn = document.getElementById('menu-btn');
  const list = document.getElementById('nav-list');

  if (btn && list) {
    btn.onclick = () => {
      const esAbierto = list.classList.toggle('abierto');
      btn.setAttribute('aria-expanded', esAbierto);
      btn.innerHTML = esAbierto ? 'Cerrar Menú ✖' : 'Menú ☰';
    };
  }
</script>
