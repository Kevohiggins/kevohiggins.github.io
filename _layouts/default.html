<!DOCTYPE html>
<html lang="es">
<head>
  {% include head.html %}
</head>
<body> <script>
    (function() {
      const hora = new Date().getHours();
      /* Si es entre las 5 AM y las 8 PM, prendemos la luz */
      if (hora >= 5 && hora < 20) {
        document.body.classList.add('modo-dia');
      }
      /* No hace falta el else porque si no es de día, 
         el CSS base (noche) se mantiene solo */
    })();
  </script>
  
  <header role="banner">
    <a href="{{ '/' | relative_url }}" style="font-size: 2.5em; font-weight: bold; text-decoration: none; display: block; margin-bottom: 10px;">
      {{ site.title }}
    </a>
    {% include nav.html %}
  </header>

  <hr>

  <main role="main" aria-label="Contenido principal">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
