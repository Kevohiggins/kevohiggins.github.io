<!DOCTYPE html>
<html lang="es">
<head>
  {% include head.html %}
</head>
<body class="modo-noche"> <script>
    /* 1. Detección inmediata de hora para evitar el parpadeo */
    (function() {
      const hora = new Date().getHours();
      if (hora >= 7 && hora < 20) {
        document.body.classList.add('modo-dia');
      } else {
        document.body.classList.remove('modo-dia');
      }
    })();
  </script>

  <header role="banner">
    <a href="{{ '/' | relative_url }}" style="font-size: 2.5em; font-weight: bold; text-decoration: none; display: block; margin-bottom: 10px;">
      {{ site.title }}
    </a>
    {% include nav.html %}
  </header>

  <hr>

  <main role="main" aria-label="Contenido principal">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
